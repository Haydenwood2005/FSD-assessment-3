<html lang="en">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <nav class="container">
        <h1>Officer Dashboard</h1>

        <button onclick="logout()" class="logout-btn">
            Logout
        </button>
    </nav>
</header>

<main class="container">

    <div class="breadcrumb">
        Home > Officer Dashboard
    </div>

    <div class="card">
        <h2>Welcome Officer</h2>
        <p id="officer-display"></p>
    </div>

    <section class="dashboard-grid">

        <div class="stat-card">
            <h3>Total Citations</h3>
            <p id="total-citations">0</p>
        </div>

        <div class="stat-card">
            <h3>Pending Cases</h3>
            <p id="pending-cases">0</p>
        </div>

        <div class="stat-card">
            <h3>Resolved Cases</h3>
            <p id="resolved-cases">0</p>
        </div>

    </section>

    <div class="card">
        <h2>Administrative Functions</h2>

        <ul>
            <li>Create Citation</li>
            <li>Update Citation</li>
            <li>Delete Citation</li>
            <li>View Citation Details</li>
        </ul>
    </div>

</main>

<script src="js/auth.js"></script>
<script src="js/officer.js"></script>

</body>
</html>
