<html lang="en">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <nav class="container">
        <h1>Citizen Login</h1>
    </nav>

     <button onclick="logoutToHome()" class="logout-btn">
                Logout
    </button>

</header>

<main class="container">

    <div class="breadcrumb">
        Home > Citizen Login
    </div>

    <div class="form-container card">

        <form id="citizen-login-form">

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="btn btn-primary">
                Login
            </button>

            <div id="error-message" class="error-message"></div>

        </form>

        <br>

        <p>
            Test Citizen Login:<br>
            citizen_user / CitizenPass123
        </p>

    </div>

</main>

<script src="js/auth.js"></script>

<script>
    document.getElementById("citizen-login-form")
        .addEventListener("submit", function(event) {

            event.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            login(username, password, "citizen");
        });
</script>

</body>
</html>
